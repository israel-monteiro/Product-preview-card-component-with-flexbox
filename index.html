<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>

  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/responsive.css">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>
<body>
  <main class="container">
    <article class="product-card">

      <picture>
        <source media="(max-width: 768px)" srcset="./src/images/image-product-mobile.jpg">

        <img class="product-image" src="./src/images/image-product-desktop.jpg"
          alt="Perfume Gabrielle Essence Eau De Parfum da Chanel" loading="lazy">
      </picture>

      <section class="info">

        <header class="header">
          <p class="product-category">Perfume</p>
          <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
          <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
            Perfumer-Creator for the House of CHANEL.</p>
        </header>
        <div class="product-price">
          <p class="price">$149.99</p>
          <del class="old-price">
            $169.99
          </del>
        </div>

        <button class="btn" type="button">
          <img src="./src/images/icon-cart.svg" alt="" aria-hidden="true">
          Add to Cart</button>

      </section>
    </article>
  </main>




</body>
</html>
